baseURL = "https://blog.fuweineng.com/"
languageCode = "zh-CN"
title = "符伟能"
theme = "blowfish"

defaultContentLanguage = "zh-cn"
disableLanguages = ["en"]
hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true
summaryLength = 80

[languages]
  [languages.zh-cn]
    languageCode = "zh-CN"
    languageName = "简体中文"
    weight = 1

[pagination]
  pagerSize = 9

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[params]
  displayName = "简体中文"
  isoCode = "zh-cn"
  rtl = false
  dateFormat = "2006-01-02"
  description = "记录投资、社会观察、生活经验与长期主义思考。"
  colorScheme = "autumn"
  defaultAppearance = "light"
  autoSwitchAppearance = false
  enableSearch = true
  enableCodeCopy = true
  enableA11y = false
  mainSections = ["posts"]
  highlightCurrentMenuArea = true

  [params.author]
    name = "符伟能"
    image = "img/avatar.svg"
    headline = "写投资、社会观察、生活经验，也记录那些值得反复思考的问题。"
    bio = "把零散念头整理成可回看的文字，希望它们既能提醒自己，也能帮助正在寻找答案的人。"
    links = [
      { github = "https://github.com/fuweineng" },
      { rss = "/index.xml" },
    ]

  [params.header]
    layout = "fixed-fill-blur"

  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = false
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    layout = "custom"
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    showMoreLinkDest = "/posts"
    cardView = true
    cardViewScreenWidth = false

  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showBreadcrumbs = true
    showDraftLabel = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    showHeadingAnchors = true
    showPagination = true
    showRelatedContent = false

  [params.list]
    showBreadcrumbs = false
    showHero = false
    cardView = true
    cardViewScreenWidth = false
    showSummary = true

  [params.taxonomy]
    showHero = false
    cardView = true

  [params.term]
    showHero = false
    cardView = true

  [params.highlight]
    enable = true
    theme = "github"

[[menu.main]]
  name = "首页"
  url = "/"
  weight = 10

[[menu.main]]
  name = "文章"
  pageRef = "posts"
  weight = 20

[[menu.main]]
  name = "标签"
  pageRef = "tags"
  weight = 30

[[menu.main]]
  name = "关于"
  pageRef = "about"
  weight = 40

[[menu.main]]
  identifier = "github"
  pre = "github"
  url = "https://github.com/fuweineng"
  weight = 50

[[menu.footer]]
  name = "GitHub"
  url = "https://github.com/fuweineng"
  weight = 10

[[menu.footer]]
  name = "RSS"
  url = "/index.xml"
  weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    tabWidth = 4
